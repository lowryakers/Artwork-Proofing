<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ProDough Artwork Proof{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f7f7f7; }
    .navbar { border-bottom: 2px solid #000; }
    .navbar-brand img { height: 36px; width: auto; }
    .drop-zone {
      cursor: pointer;
      border: 2px dashed #000 !important;
      background: #fafafa;
      transition: background .15s, border-color .15s;
      min-height: 140px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .drop-zone.drag-over { background: #f0f0f0; border-color: #444 !important; }
    .file-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #e9ecef; border-radius: 20px;
      padding: 2px 10px 2px 8px; font-size: .8rem; margin: 2px;
    }
    .file-chip .rm { cursor: pointer; color: #6c757d; margin-left: 2px; }
    .file-chip .rm:hover { color: #dc3545; }
    .check-card .card-header { cursor: pointer; user-select: none; }
    .sev-critical { background: rgba(220,53,69,.08) !important; }
    .sev-warning  { background: rgba(255,193,7,.10) !important; }
    .sev-info     { background: rgba(13,202,240,.08) !important; }
    .issue-row.dismissed { opacity: .45; text-decoration: line-through; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white py-2">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('landing') }}">
      <img src="{{ url_for('static', filename='prodough-logo.svg') }}" alt="ProDough" style="height:38px;width:auto;">
    </a>
    <div class="d-flex gap-2 ms-auto flex-wrap">
      <a href="{{ url_for('landing') }}"
         class="btn btn-sm {% if request.endpoint == 'landing' %}btn-dark{% else %}btn-outline-dark{% endif %}">
        <i class="bi bi-house me-1"></i>Home
      </a>
      <a href="{{ url_for('prodough_proof') }}"
         class="btn btn-sm {% if request.endpoint == 'prodough_proof' %}btn-dark{% else %}btn-outline-dark{% endif %}">
        <i class="bi bi-file-earmark-check me-1"></i>ProDough Proof
      </a>
      <a href="{{ url_for('brand_page') }}"
         class="btn btn-sm {% if request.endpoint == 'brand_page' %}btn-dark{% else %}btn-outline-dark{% endif %}">
        <i class="bi bi-grid me-1"></i>Brand Proof
      </a>
      <a href="{{ url_for('gtin_page') }}"
         class="btn btn-sm {% if request.endpoint == 'gtin_page' %}btn-dark{% else %}btn-outline-dark{% endif %}">
        <i class="bi bi-upc-scan me-1"></i>GTIN List
      </a>
      <a href="{{ url_for('history') }}"
         class="btn btn-sm {% if request.endpoint == 'history' %}btn-dark{% else %}btn-outline-dark{% endif %}">
        <i class="bi bi-clock-history me-1"></i>History
      </a>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
