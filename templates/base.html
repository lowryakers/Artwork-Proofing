<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ProDough Artwork Proof{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; }
    .navbar-brand .icon { font-size: 1.3rem; }
    .drop-zone {
      cursor: pointer;
      border: 2px dashed #0d6efd !important;
      background: #f8f9ff;
      transition: background .15s, border-color .15s;
      min-height: 140px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .drop-zone.drag-over { background: #e0e9ff; border-color: #0a58ca !important; }
    .file-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #e9ecef; border-radius: 20px;
      padding: 2px 10px 2px 8px; font-size: .8rem; margin: 2px;
    }
    .file-chip .rm { cursor: pointer; color: #6c757d; margin-left: 2px; }
    .file-chip .rm:hover { color: #dc3545; }
    .check-card .card-header { cursor: pointer; user-select: none; }
    .sev-critical { background: rgba(220,53,69,.08) !important; }
    .sev-warning  { background: rgba(255,193,7,.10) !important; }
    .sev-info     { background: rgba(13,202,240,.08) !important; }
    .issue-row.dismissed { opacity: .45; text-decoration: line-through; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary py-2 shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
      <span class="icon">🍩</span> ProDough Artwork Proof
    </a>
    <div class="d-flex gap-2 ms-auto">
      <a href="{{ url_for('index') }}"
         class="btn btn-sm btn-outline-light {% if request.endpoint == 'index' %}active{% endif %}">
        <i class="bi bi-upload me-1"></i>Upload
      </a>
      <a href="{{ url_for('gtin_page') }}"
         class="btn btn-sm btn-outline-light {% if request.endpoint == 'gtin_page' %}active{% endif %}">
        <i class="bi bi-upc-scan me-1"></i>GTIN List
      </a>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
